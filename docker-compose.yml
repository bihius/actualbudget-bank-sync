services:
  actual-eb-sync:
    image: ghcr.io/${GITHUB_REPOSITORY:-bihius/actualbudget-bank-sync}:latest
    build: .
    container_name: actual-eb-sync
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./keys:/keys:ro
    env_file:
      - .env
    # Environment variables can also be set directly, overriding .env
    environment:
      - NODE_ENV=production
    networks:
      - actual_default
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  actual_default:
    name: actual_default
    external: true
